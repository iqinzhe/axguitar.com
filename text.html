<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Supabase 极简登录测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Supabase 登录测试（极简版）</h2>
    <p>点击按钮测试登录，结果会显示在下方。</p>
    <button id="btn">测试登录</button>
    <pre id="result" style="margin-top:20px; background:#f4f4f4; padding:10px;"></pre>

    <script>
        const SUPABASE_URL = "https://hiupsvsbcdsgoyiieqiv.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpdXBzdnNiY2RzZ295aWllcWl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODA3NjYsImV4cCI6MjA5MTU1Njc2Nn0.qL7Qw0I7Ogws_kMoOAae_fCzkhVm-c7NhLPu8rxaJpU";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('btn').onclick = async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '登录中...';
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: 'iqinzhe@gmail.com',
                password: 'admin123'
            });
            
            if (error) {
                resultDiv.textContent = '❌ 失败: ' + error.message;
            } else {
                resultDiv.textContent = '✅ 成功！\n用户: ' + data.user.email + '\nID: ' + data.user.id;
            }
        };
    </script>
</body>
</html>
