<!-- 网络断开提醒（极简版） -->
<script>
// 仅在网络断开时显示顶部横幅
(function() {
    function showOfflineBanner() {
        var existing = document.getElementById('offlineBanner');
        if (existing) return;
        
        var banner = document.createElement('div');
        banner.id = 'offlineBanner';
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ef4444;color:#fff;text-align:center;padding:10px;z-index:10000;font-size:14px;';
        banner.innerHTML = '⚠️ ' + (navigator.language.startsWith('id') ? 'Koneksi terputus. Data mungkin tidak tersimpan.' : '网络连接已断开，数据可能无法保存。');
        document.body.insertBefore(banner, document.body.firstChild);
    }
    
    function hideOfflineBanner() {
        var banner = document.getElementById('offlineBanner');
        if (banner) banner.remove();
    }
    
    window.addEventListener('offline', showOfflineBanner);
    window.addEventListener('online', hideOfflineBanner);
    
    if (!navigator.onLine) showOfflineBanner();
})();
</script>

<!-- 初始化脚本（保持原样） -->
<script>
window.addEventListener('error', function(e) {
    console.error('Global error:', e.error);
});

var initTimeout = setTimeout(function() {
    showError('加载超时，请刷新页面重试');
}, 10000);

document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        clearTimeout(initTimeout);
        try {
            if (!window.APP) throw new Error('APP module not loaded');
            if (typeof window.APP.init !== 'function') throw new Error('APP.init is not a function');
            window.APP.init();
        } catch (err) {
            console.error('Init error:', err);
            showError('Gagal memuat aplikasi: ' + err.message);
        }
    }, 100);
});

function showError(message) {
    var app = document.getElementById('app');
    if (app) {
        app.innerHTML = '' +
            '<div class="error-container">' +
                '<div class="error-card">' +
                    '<div class="error-icon">⚠️</div>' +
                    '<h3 class="error-title">Error Sistem</h3>' +
                    '<p class="error-message">' + escapeHtml(message) + '</p>' +
                    '<button onclick="location.reload()" class="error-btn">Muat Ulang</button>' +
                '</div>' +
            '</div>';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
</script>
