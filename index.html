/* === variables.css 内联 === */
@layer base, utilities, components, pages;
:root {
  --primary: #0e7490; --primary-light: #22d3ee; --primary-soft: #cffafe; --primary-dark: #0c4a6e;
  --success: #16a34a; --success-dark: #15803d; --success-light: #f0fdf4;
  --warning: #d97706; --warning-dark: #b45309; --warning-light: #fffbeb;
  --danger: #dc2626; --danger-dark: #b91c1c; --danger-light: #fff1f2;
  --bg-page: #f4f6f9; --bg-card: #ffffff; --bg-highlight: #f0f9ff;
  --bg-hover: #eef2f7; --bg-modal: rgba(7,22,48,0.55); --bg-input-readonly: #f8fafc;
  --text-primary: #0c1929; --text-secondary: #3d5068; --text-muted: #6b7e95; --text-white: #ffffff;
  --border-light: #dde3ec; --border-medium: #c4cedb;
  --shadow-none: none;
  --shadow-sm: 0 1px 3px 0 rgb(14 116 144 / 0.06);
  --shadow-md: 0 2px 6px 0 rgb(14 116 144 / 0.09);
  --shadow-lg: 0 4px 12px -1px rgb(14 116 144 / 0.12);
  --shadow-xl: 0 8px 20px -2px rgb(14 116 144 / 0.15);
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-2xl: 20px;
  --spacing-1: 3px; --spacing-1-5: 5px; --spacing-2: 6px; --spacing-3: 10px;
  --spacing-4: 14px; --spacing-5: 18px; --spacing-6: 22px; --spacing-7: 26px; --spacing-8: 30px;
  --transition-fast: 0.15s ease; --transition-slow: 0.3s ease;
  --font-xs: 0.75rem; --font-sm: 0.875rem; --font-md: 1rem;
  --font-lg: 1.125rem; --font-xl: 1.25rem; --font-2xl: 1.5rem;
  --white: #ffffff;
  --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
  --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
  --gray-800:#1f2937; --gray-900:#111827;
  --red-500:#ef4444; --red-600:#dc2626; --red-700:#b91c1c;
  --green-500:#22c55e; --green-600:#16a34a; --green-700:#15803d;
  --blue-500:#3b82f6; --blue-600:#2563eb; --blue-700:#1d4ed8;
  --purple-600:#7c3aed; --purple-700:#6d28d9; --amber-600:#d97706; --amber-700:#b45309;
  --cyan-600:#0891b2; --teal-600:#0d9488; --sky-500:#0ea5e9; --sky-600:#0284c7;
  --gradient-sidebar: linear-gradient(180deg,#eef3f9 0%,#e3edf7 50%,#d6e6f5 100%);
  --gradient-primary: linear-gradient(135deg,var(--primary-dark),var(--primary));
  --gradient-cta: linear-gradient(135deg,#0e7490,#06b6d4);
  --gradient-kpi-blue: linear-gradient(90deg,#0e7490,#06b6d4);
  --gradient-kpi-amber: linear-gradient(90deg,#d97706,#f59e0b);
  --gradient-kpi-green: linear-gradient(90deg,#15803d,#16a34a);
  --gradient-util-bar: linear-gradient(90deg,#f59e0b,#fbbf24);
  --gradient-net-profit: linear-gradient(135deg,#e0f2fe,#f0f9ff);
  --gradient-backup-card: linear-gradient(135deg,#e8f4e8 0%,#d4ecd4 100%);
  --opacity-disabled: 0.6; --opacity-icon: 0.4; --opacity-overlay: 0.55;
  --z-sidebar: 100; --z-sidebar-overlay: 99; --z-topbar: 50; --z-modal: 9999; --z-tooltip: 10000;
}

/* === critical.css 内联（防止 FOUC + 精美加载动画） === */
@layer base {
  .dashboard-content { opacity: 0; }
  .dashboard-content.loaded { opacity: 1; transition: opacity 0.4s ease; }

  /* 遮罩层：磨砂背景 + 点阵纹理 */
  .loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #eef3f8;
    background-image: radial-gradient(circle, #c4d8e6 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: var(--z-modal);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px;
    transition: opacity 0.4s ease;
  }

  /* 品牌标识区 */
  .loading-brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .loading-brand-logo {
    height: 36px; width: auto;
  }
  .loading-brand-name {
    font-size: 1.35rem; font-weight: 700;
    color: #0e7490; letter-spacing: 0.5px;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  }

  /* 音量柱动画（5根） */
  .loading-bars {
    display: flex; gap: 5px; align-items: flex-end; height: 22px;
  }
  .loading-bar {
    width: 4px; border-radius: 2px; background: #0e7490;
    animation: loBar 1.2s ease-in-out infinite;
    transform-origin: bottom;
  }
  .loading-bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
  .loading-bar:nth-child(2) { animation-delay: 0.15s; height: 14px; }
  .loading-bar:nth-child(3) { animation-delay: 0.3s;  height: 20px; }
  .loading-bar:nth-child(4) { animation-delay: 0.45s; height: 14px; }
  .loading-bar:nth-child(5) { animation-delay: 0.6s;  height: 8px; }

  /* 文字区 */
  .loading-text {
    font-size: 0.875rem; color: #3d5068;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    letter-spacing: 0.4px;
    display: flex; align-items: center; gap: 4px;
  }

  /* 进度条（真实进度驱动） */
  .loading-progress {
    width: 240px; height: 3px;
    background: rgba(14,116,144,0.12);
    border-radius: 2px; overflow: hidden;
  }
  .loading-progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #0e7490, #06b6d4);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* 关键帧 */
  @keyframes loBar {
    0%,100% { opacity: 0.3; transform: scaleY(0.5); }
    50%     { opacity: 1;   transform: scaleY(1); }
  }
  @keyframes loDot {
    0%,100% { opacity: 0.15; }
    50%     { opacity: 1; }
  }
}
</style>

<!--
  ==================== 脚本加载策略 ====================

  第 0 层：立即执行（内联同步脚本）
    - Token 状态检查 + 进度控制初始化

  第 1 层：CDN + 核心基础（defer，按序执行）
    - config.js → supabase-js（锁定版本 2.105.4）
    - js/utils.js → fee-config.js
    - toast.js → cache.js → supabase.js → auth.js → permission.js → audit.js
    - order.js → store.js → storage.js → migration.js

  第 2 层：核心应用（defer）
    - app-dashboard-core.js（首屏仪表盘）

  第 3 层：非核心页面模块（defer，不阻塞首屏）

  第 4 层：启动逻辑（type="module"）
    - module 脚本天然在所有 defer 脚本执行完毕后运行

  📊 加载进度分布：
    0%  ── 页面开始加载
    50% ── 基础模块全部就绪（migration.js onload）
    90% ── app-dashboard-core.js 就绪（onload）
    93% ── DashboardCore.init() 开始执行
    96% ── KPI 数据查询完成
    100% ─ DOM 渲染完成，加载层淡出
-->

<!-- ========== 第 0 层：Token 状态初始化 + 进度控制 ========== -->
<script>
(function () {
    'use strict';

    // ---- 加载进度控制 ----
    var currentProgress = 0;
    window.__updateLoadingProgress = function(targetPercent) {
        if (targetPercent > currentProgress) {
            currentProgress = targetPercent;
            var bar = document.getElementById('loadingProgressBar');
            if (bar) bar.style.width = currentProgress + '%';
        }
    };

    // ---- Token 状态检查 ----
    try {
        var hasValidToken = false;
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.startsWith('sb-') && key.endsWith('-auth-token')) {
                try {
                    var tokenData = JSON.parse(localStorage.getItem(key));
                    if (tokenData && tokenData.expires_at) {
                        if (new Date(tokenData.expires_at * 1000) > new Date()) {
                            hasValidToken = true;
                        }
                    }
                } catch (e) { /* 数据损坏，忽略 */ }
                break;
            }
        }
        if (!hasValidToken) {
            try {
                var clearKeys = [
                    'jf_current_state', 'jf_last_state', 'jf_current_page',
                    'jf_current_filter', 'jf_current_order_id', 'jf_current_customer_id',
                    'jf_last_page', 'jf_last_filter', 'jf_last_order_id', 'jf_last_customer_id'
                ];
                clearKeys.forEach(function (k) {
                    sessionStorage.removeItem(k);
                    localStorage.removeItem(k);
                });
            } catch (e) { /* ignore */ }
        }
    } catch (e) { /* 静默处理 */ }
})();
</script>

<!-- ========== 第 1 层：核心基础脚本（defer） ========== -->
<script defer src="config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>

<!-- ========== 第 4 层：启动逻辑（type="module"） ========== -->
<script type="module">
(function () {
    'use strict';

    var JF = window.JF || {};
    window.JF = JF;

    // ==================== APP 门面层 ====================
    var APP = {
        forceClearAndReload: function () {
            try {
                var keysToRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && (
                        key.indexOf('supabase.') === 0 ||
                        key.indexOf('sb-') === 0 ||
                        key.indexOf('jf_') === 0
                    )) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(function (k) { localStorage.removeItem(k); });
                sessionStorage.clear();
                document.cookie.split(';').forEach(function (c) {
                    document.cookie = c.replace(/^ +/, '')
                        .replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/');
                });
            } catch (e) { /* ignore */ }
            setTimeout(function () { location.reload(); }, 500);
        },

        exportData: function () {
            if (typeof BackupStorage !== 'undefined' && BackupStorage.backup) {
                BackupStorage.backup();
            } else {
                Utils.toast.error(Utils.t('backup_restore') + ' ' +
                    (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
            }
        },

        importData: function () {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                if (e.target.files && e.target.files[0]) {
                    if (typeof BackupStorage !== 'undefined' && BackupStorage.restore) {
                        BackupStorage.restore(e.target.files[0]);
                    } else {
                        Utils.toast.error(Utils.t('backup_restore') + ' ' +
                            (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
                    }
                }
            };
            input.click();
        },

        sendWAReminder: async function (orderId) {
            try {
                var result = await SUPABASE.getPaymentHistory(orderId);
                var order = result.order;
                if (!order) {
                    Utils.toast.error(Utils.t('order_not_found'));
                    return;
                }
                var storeWA = await SUPABASE.getStoreWANumber(order.store_id);
                if (!storeWA) {
                    Utils.toast.warning(Utils.lang === 'id'
                        ? 'Nomor WhatsApp toko belum diatur' : '门店 WhatsApp 号码未设置');
                    return;
                }
                var customerPhone = order.customer_phone;
                if (!customerPhone) {
                    Utils.toast.warning(Utils.lang === 'id'
                        ? 'Nomor telepon nasabah tidak tersedia' : '客户电话不存在');
                    return;
                }
                var cleanPhone = customerPhone.replace(/[^0-9]/g, '');
                if (cleanPhone.indexOf('0') === 0) {
                    cleanPhone = '62' + cleanPhone.substring(1);
                } else if (cleanPhone.indexOf('62') !== 0) {
                    cleanPhone = '62' + cleanPhone;
                }
                var waMessage = JF.WAPage ? JF.WAPage.generateWAText(order, storeWA) : '';
                window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(waMessage), '_blank');
                await SUPABASE.logReminder(order.id);
                Utils.toast.success(Utils.lang === 'id' ? 'Membuka WhatsApp...' : '正在打开 WhatsApp...');
            } catch (error) {
                Utils.toast.error(Utils.lang === 'id' ? 'Gagal mengirim pengingat' : '发送提醒失败');
            }
        },

        printCurrentPage: function () {
            if (JF.PrintPage && typeof JF.PrintPage.printCurrentPage === 'function') {
                JF.PrintPage.printCurrentPage();
            } else {
                window.print();
            }
        }
    };

    window.APP = Object.assign(window.APP || {}, APP);
    JF.APP = window.APP;

    // ==================== 全局快捷键 ====================
    document.addEventListener('keydown', function (e) {
        if (e.altKey && !e.shiftKey && e.key === 'r') {
            e.preventDefault();
            if (JF.DashboardCore && typeof JF.DashboardCore.forceRecovery === 'function') {
                JF.DashboardCore.forceRecovery();
            } else if (window.APP && typeof window.APP.forceRecovery === 'function') {
                window.APP.forceRecovery();
            } else {
                location.reload();
            }
        }
        if (e.altKey && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            APP.forceClearAndReload();
        }
    });

    // ==================== 应用启动 ====================
    var loadingOverlay   = document.getElementById('loadingOverlay');
    var dashboardContent = document.getElementById('dashboardContent');

    function hideLoading() {
        if (window.__updateLoadingProgress) window.__updateLoadingProgress(100);

        setTimeout(function () {
            if (loadingOverlay) {
                loadingOverlay.style.transition = 'opacity 0.5s ease';
                loadingOverlay.style.opacity = '0';
                setTimeout(function () { loadingOverlay.style.display = 'none'; }, 500);
            }
            if (dashboardContent) dashboardContent.classList.add('loaded');
        }, 300);
    }

    window.__hideLoadingOverlay = hideLoading;

    var fallbackObserver = new MutationObserver(function () {
        var appEl = document.getElementById('app');
        if (appEl && appEl.querySelector('.dashboard-v2')) {
            hideLoading();
            fallbackObserver.disconnect();
        }
    });

    function startApp() {
        if (typeof JF !== 'undefined' && JF.DashboardCore && JF.DashboardCore.init) {
            // 核心模块就绪，开始初始化
            if (window.__updateLoadingProgress) window.__updateLoadingProgress(93);

            // 注入 KPI 完成回调
            var originalRender = JF.DashboardCore.originalRenderDashboard;
            if (originalRender) {
                JF.DashboardCore.originalRenderDashboard = async function () {
                    var result = await originalRender.apply(this, arguments);
                    if (window.__updateLoadingProgress) window.__updateLoadingProgress(96);
                    return result;
                };
            }

            JF.DashboardCore.init();

            var appEl = document.getElementById('app');
            if (appEl) {
                fallbackObserver.observe(appEl, { childList: true, subtree: true });
                setTimeout(function () {
                    if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                        hideLoading();
                        fallbackObserver.disconnect();
                    }
                }, 15000);
            }
        } else {
            setTimeout(startApp, 100);
        }
    }

    startApp();
})();
</script>
