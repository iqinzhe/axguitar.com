<!-- ===== 网络断开提醒（极简版，不依赖任何模块） ===== -->
<script>
(function() {
    function showOfflineBanner() {
        var existing = document.getElementById('offlineBanner');
        if (existing) return;
        
        var banner = document.createElement('div');
        banner.id = 'offlineBanner';
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ef4444;color:#fff;text-align:center;padding:10px;z-index:10000;font-size:14px;';
        banner.innerHTML = '⚠️ ' + (navigator.language.startsWith('id') ? 'Koneksi terputus. Data mungkin tidak tersimpan.' : '网络连接已断开，数据可能无法保存。');
        document.body.insertBefore(banner, document.body.firstChild);
    }
    
    function hideOfflineBanner() {
        var banner = document.getElementById('offlineBanner');
        if (banner) banner.remove();
    }
    
    window.addEventListener('offline', showOfflineBanner);
    window.addEventListener('online', hideOfflineBanner);
    
    if (!navigator.onLine) showOfflineBanner();
})();
</script>

<!-- ==================== 初始化脚本 ==================== -->
<script>
// 全局错误捕获
window.addEventListener('error', function(e) {
    console.error('Global error:', e.error || e.message);
});

// 初始化超时处理（15秒）
var initTimeout = setTimeout(function() {
    showError(
        (navigator.language && navigator.language.startsWith('id'))
            ? '⏳ Memuat terlalu lama. Silakan periksa koneksi internet Anda dan muat ulang halaman.'
            : '⏳ 加载超时，请检查网络连接后刷新页面重试。'
    );
}, 15000);

// DOM 加载完成后初始化 APP
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        clearTimeout(initTimeout);
        try {
            if (!window.APP) {
                throw new Error('APP module not loaded - check if app-dashboard-core.js exists');
            }
            if (typeof window.APP.init !== 'function') {
                throw new Error('APP.init is not a function - check app-dashboard-core.js exports');
            }
            console.log('✅ 所有模块加载完成，初始化 APP...');
            window.APP.init();
        } catch (err) {
            console.error('Init error:', err);
            var langMsg = (navigator.language && navigator.language.startsWith('id'))
                ? 'Gagal memuat aplikasi: ' + err.message
                : '应用加载失败: ' + err.message;
            showError(langMsg);
        }
    }, 200); // 增加到 200ms，确保所有脚本执行完毕
});

function showError(message) {
    var app = document.getElementById('app');
    if (app) {
        var isId = navigator.language && navigator.language.startsWith('id');
        app.innerHTML = '' +
            '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;padding:20px;">' +
                '<div style="max-width:420px;width:100%;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.1);padding:32px;text-align:center;">' +
                    '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
                    '<h3 style="margin:0 0 12px 0;font-size:18px;color:#1e293b;">' + (isId ? 'Error Sistem' : '系统错误') + '</h3>' +
                    '<p style="margin:0 0 20px 0;color:#64748b;font-size:14px;line-height:1.5;white-space:pre-wrap;">' + escapeHtml(message) + '</p>' +
                    '<button onclick="location.reload()" style="padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;">' +
                        (isId ? '🔄 Muat Ulang' : '🔄 刷新页面') +
                    '</button>' +
                '</div>' +
            '</div>';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
</script>
