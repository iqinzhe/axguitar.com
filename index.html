<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF GADAI SYSTEM V3 | Commercial Pawn System</title>

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

<div id="app">

    <!-- ================= LOGIN PAGE ================= -->
    <div id="loginPage" class="login-page">

        <div class="login-box">
            <h2>🏦 JF GADAI SYSTEM V3</h2>
            <p>Commercial Pawn Loan Management System</p>

            <input type="text" id="username" placeholder="Username">

            <input type="password" id="password" placeholder="Password">

            <button onclick="login()">Login</button>

            <div style="margin-top:10px;font-size:12px;opacity:0.7;">
                Demo: admin / 123456
            </div>
        </div>

    </div>

    <!-- ================= MAIN APP ================= -->
    <div id="adminApp" class="admin-app" style="display:none;">

        <!-- LEFT SIDEBAR -->
        <div class="sidebar">

            <div class="logo">
                🏦 JF GADAI
            </div>

            <a onclick="navigate('dashboard')">📊 Dashboard</a>

            <a onclick="navigate('loans')">💰 Loans</a>

            <a onclick="navigate('payments')">📜 Payments</a>

            <a onclick="navigate('logs')" id="menuLogs">🧾 Logs</a>

            <a onclick="navigate('users')" id="menuUsers">👤 Users</a>

            <hr>

            <a onclick="logout()">🚪 Logout</a>

        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="main-content">

            <!-- TOP BAR -->
            <div class="top-bar">

                <div>
                    <b>JF GADAI SYSTEM V3</b>
                </div>

                <div id="userInfo">
                    👤 Not logged in
                </div>

            </div>

            <!-- PAGE CONTAINER (SPA RENDER TARGET) -->
            <div id="page" class="page-container">

                <!-- JS will render here -->

            </div>

        </div>

    </div>

</div>

<!-- ================= JS FILES ================= -->

<script src="js/data/seed.js"></script>

<script src="js/auth.js"></script>

<script src="js/router.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/loans.js"></script>

<script src="js/payments.js"></script>

<script src="js/logs.js"></script>

<script src="js/users.js"></script>

<script src="js/app.js"></script>

</body>
</html>
