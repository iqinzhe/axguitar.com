<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#ffffff">
<title>JF! by Gadai - Sistem Manajemen Gadai</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/android-chrome-512x512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="main.css">
</head>
<body>
<div id="app">
    <div class="loading-container">
        <div class="loader"></div>
        <p class="loading-text">Memuat sistem...</p>
    </div>
</div>

<style>
    .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f8fafc;
    }
    .loading-text {
        color: #64748b;
        margin-top: 16px;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/permission.js"></script>
<script src="js/storage.js"></script>
<script src="js/order.js"></script>
<script src="js/store.js"></script>
<script src="js/migration.js"></script>
<script src="js/app-dashboard.js"></script>
<script src="js/app-customers.js"></script>
<script src="js/app-payments.js"></script>

<script>
window.addEventListener('error', function(e) {
    console.error('Global error:', e.error);
});

document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        try {
            if (window.APP && typeof window.APP.init === 'function') {
                window.APP.init();
            } else {
                throw new Error('APP module not available');
            }
        } catch (err) {
            console.error('Init error:', err);
            showError('Gagal memuat aplikasi: ' + err.message);
        }
    }, 100);
});

function showError(message) {
    const app = document.getElementById('app');
    if (app) {
        app.innerHTML = `
            <div class="error-container">
                <div class="error-card">
                    <div class="error-icon">⚠️</div>
                    <h3 class="error-title">Error Sistem</h3>
                    <p class="error-message">${escapeHtml(message)}</p>
                    <button onclick="location.reload()" class="error-btn">Muat Ulang</button>
                </div>
            </div>
        `;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
