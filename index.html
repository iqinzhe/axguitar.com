@layer base, utilities, components, pages;

  --text-primary: #0c1929; --text-secondary: #3d5068; --text-muted: #6b7e95; --text-white: #ffffff;
  --border-light: #dde3ec; --border-medium: #c4cedb;
  --shadow-none: none;

  --white: #ffffff;
  --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
  --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
  --gray-800:#1f2937; --gray-900:#111827;
  --red-500:#ef4444; --red-600:#dc2626; --red-700:#b91c1c;
  --green-500:#22c55e; --green-600:#16a34a; --green-700:#15803d;
  --blue-500:#3b82f6; --blue-600:#2563eb; --blue-700:#1d4ed8;
  --purple-600:#7c3aed; --purple-700:#6d28d9; --amber-600:#d97706; --amber-700:#b45309;
  --cyan-600:#0891b2; --teal-600:#0d9488; --sky-500:#0ea5e9; --sky-600:#0284c7;

  --z-sidebar: 100; --z-sidebar-overlay: 99; --z-topbar: 50; --z-modal: 9999; --z-tooltip: 10000;
}

/* === critical.css 内联 === */
@layer base {
  .dashboard-content{opacity:0}
  .dashboard-content.loaded{opacity:1;transition:opacity 0.4s ease}

  .loading-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:#eef3f8;
    background-image:radial-gradient(circle,#c4d8e6 1px,transparent 1px);
    background-size:28px 28px;
    z-index:var(--z-modal);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;
    transition:opacity 0.4s ease;
  }

  .loading-brand{display:flex;flex-direction:column;align-items:center;gap:10px}
  .loading-brand-logo-wrap{width:56px;height:56px;display:flex;align-items:center;justify-content:center}
  .loading-brand-logo{height:56px;width:auto;border-radius:12px}
  .loading-brand-name{
    font-size:1.35rem;font-weight:700;color:#0e7490;letter-spacing:.5px;
    font-family:'Segoe UI','Microsoft YaHei',sans-serif;margin:0;
  }
  .loading-brand-tagline{
    font-size:.72rem;color:#6b7e95;
    font-family:'Segoe UI','Microsoft YaHei',sans-serif;
    letter-spacing:.3px;margin-top:-6px;
  }

  .loading-steps{display:flex;gap:7px;align-items:center}
  .loading-step{
    width:7px;height:7px;border-radius:50%;
    background:rgba(14,116,144,.18);
    transition:background .35s ease,transform .35s ease;
  }
  .loading-step.done{background:#0e7490}
  .loading-step.active{background:#06b6d4;animation:loStepPulse 1s ease-in-out infinite}

  /* ★优化：loading-text 使用固定高度 + 双元素交叉淡入淡出，消除文字跳动 */
  .loading-text{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    font-family:'Segoe UI','Microsoft YaHei',sans-serif;
    height:38px;justify-content:center;
  }

  /* ★优化：每行独立容器，固定高度，overflow:hidden 锁定布局 */
  .loading-text-line{
    position:relative;
    height:1.4em;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* ★优化：主文案 - 绝对定位叠放 */
  .loading-text-main{
    font-size:.875rem;font-weight:500;color:#3d5068;letter-spacing:.3px;
    line-height:1.4;white-space:nowrap;
    position:absolute;
    opacity:1;
    transition:opacity 0.25s ease;
  }
  .loading-text-main.fading{opacity:0}

  /* ★优化：副文案 - 绝对定位叠放 */
  .loading-text-sub{
    font-size:.72rem;color:#6b7e95;letter-spacing:.2px;
    line-height:1.4;white-space:nowrap;
    position:absolute;
    opacity:1;
    transition:opacity 0.25s ease;
  }
  .loading-text-sub.fading{opacity:0}

  /* ★优化：下一个文案（隐藏等待） */
  .loading-text-next{
    opacity:0;
    pointer-events:none;
  }

  .loading-progress-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
  .loading-progress{
    width:240px;height:5px;background:rgba(14,116,144,.12);
    border-radius:3px;overflow:hidden;position:relative;
  }
  .loading-progress-bar{
    height:100%;width:0%;
    background:linear-gradient(90deg,#0e7490,#06b6d4);
    border-radius:3px;
    transition:width .5s cubic-bezier(.4,0,.2,1);
    position:relative;
  }
  .loading-progress-bar::after{
    content:'';position:absolute;right:0;top:0;bottom:0;width:24px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55));
    border-radius:3px;animation:loShimmer 1.6s ease-in-out infinite;
  }
  .loading-progress-pct{
    font-size:.7rem;font-weight:600;color:#0e7490;
    font-family:'Segoe UI','Microsoft YaHei',sans-serif;
    letter-spacing:.3px;min-width:30px;text-align:center;
  }

  @keyframes loStepPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.65}}
  @keyframes loShimmer{0%,100%{opacity:0}50%{opacity:1}}
}

<!-- 脚本层：0=Token检查+进度控制 1=基础模块(defer) 2=dashboard-core(defer) 3=页面模块(defer) 4=启动逻辑(module) -->

<!-- ========== 第 0 层：Token 状态初始化 + 进度控制 ========== -->
<script>
(function(){
'use strict';
// 阶段配置：[进度下限, 主文案, 副文案, 步骤点索引]
var S=[
  [0,  'Memulai sistem...',     'Memeriksa sesi login',              0],
  [16, 'Memuat modul dasar...', 'Menyiapkan komponen sistem',         1],
  [50, 'Memuat modul inti...',  'Menghubungkan ke server',           2],
  [90, 'Menyiapkan dasbor...',  'Hampir selesai...',                 3],
  [96, 'Memuat data KPI...',    'Mengambil data terkini',            3],
  [100,'Siap!',                 'Membuka sistem...',                 4]
];
var cur=0, ft=null, lsi=-1;

function gS(p){for(var i=S.length-1;i>=0;i--)if(p>=S[i][0])return i;return 0;}

function uSteps(a){
  for(var i=1;i<=5;i++){
    var el=document.getElementById('lstep'+i);
    if(!el)continue;
    el.className='loading-step'+(i-1<a?' done':i-1===a?' active':'');
  }
}

// ★优化：双元素交叉淡入淡出，消除文字跳动
var swTimer=null;
var currentMain='A', currentSub='A';

function swTxt(m,s){
    var lineM=document.getElementById('loadingTextMainLine'),
        lineS=document.getElementById('loadingTextSubLine');
    if(!lineM||!lineS)return;

    // 获取当前可见元素和隐藏元素
    var curM,nextM,curS,nextS;
    if(currentMain==='A'){
        curM=document.getElementById('loadingTextMainA');
        nextM=document.getElementById('loadingTextMainB');
    }else{
        curM=document.getElementById('loadingTextMainB');
        nextM=document.getElementById('loadingTextMainA');
    }
    if(currentSub==='A'){
        curS=document.getElementById('loadingTextSubA');
        nextS=document.getElementById('loadingTextSubB');
    }else{
        curS=document.getElementById('loadingTextSubB');
        nextS=document.getElementById('loadingTextSubA');
    }

    // 如果内容和当前一致，跳过
    if(curM.textContent===m&&curS.textContent===s)return;

    if(swTimer){clearTimeout(swTimer);swTimer=null;}

    // 把新内容写入隐藏元素
    nextM.textContent=m;
    nextS.textContent=s;

    // 强制回流，确保过渡生效
    void nextM.offsetWidth;void nextS.offsetWidth;

    // 交叉淡入淡出：当前元素 fade out，下一个元素 fade in
    curM.classList.add('fading');
    curS.classList.add('fading');
    nextM.classList.remove('fading');
    nextS.classList.remove('fading');

    // 切换指针
    currentMain=(currentMain==='A'?'B':'A');
    currentSub=(currentSub==='A'?'B':'A');

    // 过渡结束后清理旧元素状态
    swTimer=setTimeout(function(){
        swTimer=null;
        curM.classList.add('fading');
        curS.classList.add('fading');
    },260);
}

window.__updateLoadingProgress=function(t){
  if(t<=cur)return;
  cur=t;
  var b=document.getElementById('loadingProgressBar');
  if(b)b.style.width=cur+'%';
  var p=document.getElementById('loadingProgressPct');
  if(p)p.textContent=cur+'%';
  var si=gS(cur);
  if(si!==lsi){lsi=si;swTxt(S[si][1],S[si][2]);}
  uSteps(S[si][3]);
  if(cur>=50&&ft){clearInterval(ft);ft=null;}
};

// 伪进度爬行：0→45%，每900ms +3%，真实节点50%到达后自动停止
ft=setInterval(function(){
  if(cur<45)window.__updateLoadingProgress(cur+3);
  else{clearInterval(ft);ft=null;}
},900);

// Token 状态检查
try{
  var ok=false,i,k,d;
  for(i=0;i<localStorage.length;i++){
    k=localStorage.key(i);
    if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
      try{d=JSON.parse(localStorage.getItem(k));if(d&&d.expires_at&&new Date(d.expires_at*1000)>new Date())ok=true;}catch(e){}
      break;
    }
  }
  if(!ok){
    ['jf_current_state','jf_last_state','jf_current_page','jf_current_filter',
     'jf_current_order_id','jf_current_customer_id','jf_last_page','jf_last_filter',
     'jf_last_order_id','jf_last_customer_id'].forEach(function(k){
      sessionStorage.removeItem(k);localStorage.removeItem(k);
    });
  }
}catch(e){}
})();
</script>

<!-- ========== 第 4 层：启动逻辑（type="module"） ========== -->
<script type="module">
(function () {
    'use strict';

    var JF = window.JF || {};
    window.JF = JF;

    // ==================== APP 门面层 ====================
    var APP = {
        forceClearAndReload: function () {
            try {
                var keysToRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && (
                        key.indexOf('supabase.') === 0 ||
                        key.indexOf('sb-') === 0 ||
                        key.indexOf('jf_') === 0
                    )) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(function (k) { localStorage.removeItem(k); });
                sessionStorage.clear();
                document.cookie.split(';').forEach(function (c) {
                    document.cookie = c.replace(/^ +/, '')
                        .replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/');
                });
            } catch (e) { /* ignore */ }
            setTimeout(function () { location.reload(); }, 500);
        },

        exportData: function () {
            if (typeof BackupStorage !== 'undefined' && BackupStorage.backup) {
                BackupStorage.backup();
            } else {
                Utils.toast.error(Utils.t('backup_restore') + ' ' +
                    (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
            }
        },

        importData: function () {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                if (e.target.files && e.target.files[0]) {
                    if (typeof BackupStorage !== 'undefined' && BackupStorage.restore) {
                        BackupStorage.restore(e.target.files[0]);
                    } else {
                        Utils.toast.error(Utils.t('backup_restore') + ' ' +
                            (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
                    }
                }
            };
            input.click();
        },

        sendWAReminder: async function (orderId) {
            try {
                var result = await SUPABASE.getPaymentHistory(orderId);
                var order = result.order;
                if (!order) {
                    Utils.toast.error(Utils.t('order_not_found'));
                    return;
                }
                var storeWA = await SUPABASE.getStoreWANumber(order.store_id);
                if (!storeWA) {
                    Utils.toast.warning(Utils.lang === 'id'
                        ? 'Nomor WhatsApp toko belum diatur' : '门店 WhatsApp 号码未设置');
                    return;
                }
                var customerPhone = order.customer_phone;
                if (!customerPhone) {
                    Utils.toast.warning(Utils.lang === 'id'
                        ? 'Nomor telepon nasabah tidak tersedia' : '客户电话不存在');
                    return;
                }
                var cleanPhone = customerPhone.replace(/[^0-9]/g, '');
                if (cleanPhone.indexOf('0') === 0) {
                    cleanPhone = '62' + cleanPhone.substring(1);
                } else if (cleanPhone.indexOf('62') !== 0) {
                    cleanPhone = '62' + cleanPhone;
                }
                var waMessage = JF.WAPage ? JF.WAPage.generateWAText(order, storeWA) : '';
                window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(waMessage), '_blank');
                await SUPABASE.logReminder(order.id);
                Utils.toast.success(Utils.lang === 'id' ? 'Membuka WhatsApp...' : '正在打开 WhatsApp...');
            } catch (error) {
                Utils.toast.error(Utils.lang === 'id' ? 'Gagal mengirim pengingat' : '发送提醒失败');
            }
        },

        printCurrentPage: function () {
            if (JF.PrintPage && typeof JF.PrintPage.printCurrentPage === 'function') {
                JF.PrintPage.printCurrentPage();
            } else {
                window.print();
            }
        }
    };

    window.APP = Object.assign(window.APP || {}, APP);
    JF.APP = window.APP;

    // ==================== 全局快捷键 ====================
    document.addEventListener('keydown', function (e) {
        if (e.altKey && !e.shiftKey && e.key === 'r') {
            e.preventDefault();
            if (JF.DashboardCore && typeof JF.DashboardCore.forceRecovery === 'function') {
                JF.DashboardCore.forceRecovery();
            } else if (window.APP && typeof window.APP.forceRecovery === 'function') {
                window.APP.forceRecovery();
            } else {
                location.reload();
            }
        }
        if (e.altKey && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            APP.forceClearAndReload();
        }
    });

    // ==================== 应用启动 ====================
    var loadingOverlay   = document.getElementById('loadingOverlay');
    var dashboardContent = document.getElementById('dashboardContent');

    function hideLoading() {
        if (window.__updateLoadingProgress) window.__updateLoadingProgress(100);

        setTimeout(function () {
            if (loadingOverlay) {
                loadingOverlay.style.transition = 'opacity 0.5s ease';
                loadingOverlay.style.opacity = '0';
                setTimeout(function () { loadingOverlay.style.display = 'none'; }, 500);
            }
            if (dashboardContent) dashboardContent.classList.add('loaded');
        }, 300);
    }

    window.__hideLoadingOverlay = hideLoading;

    var fallbackObserver = new MutationObserver(function () {
        var appEl = document.getElementById('app');
        if (appEl && appEl.querySelector('.dashboard-v2')) {
            hideLoading();
            fallbackObserver.disconnect();
        }
    });

    function startApp() {
        if (typeof JF !== 'undefined' && JF.DashboardCore && JF.DashboardCore.init) {
            // 核心模块就绪，开始初始化
            if (window.__updateLoadingProgress) window.__updateLoadingProgress(93);

            // 注入 KPI 完成回调
            var originalRender = JF.DashboardCore.originalRenderDashboard;
            if (originalRender) {
                JF.DashboardCore.originalRenderDashboard = async function () {
                    var result = await originalRender.apply(this, arguments);
                    if (window.__updateLoadingProgress) window.__updateLoadingProgress(96);
                    return result;
                };
            }

            JF.DashboardCore.init();

            var appEl = document.getElementById('app');
            if (appEl) {
                fallbackObserver.observe(appEl, { childList: true, subtree: true });
                setTimeout(function () {
                    if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                        hideLoading();
                        fallbackObserver.disconnect();
                    }
                }, 15000);
            }
        } else {
            setTimeout(startApp, 100);
        }
    }

    startApp();
})();
</script>
