<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="robots" content="noindex, nofollow">

<!-- PWA / 移动端适配 -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JF! Gadai">

<!-- Favicon -->
<link rel="icon" href="icons/favicon-192x192.png">
<link rel="apple-touch-icon" href="icons/favicon-192x192.png">
<link rel="manifest" href="/site.webmanifest?v=1">

<!-- CSS 样式 -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/responsive.css">

<!-- 预加载关键资源 -->
<link rel="preconnect" href="https://hiupsvsbcdsgoyiieqiv.supabase.co">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
</head>
<body>
<div id="app">
    <div class="loading-container">
        <div class="loader"></div>
        <p class="loading-text" id="loadingStatus">Memuat sistem...</p>
    </div>
</div>

<!-- ========== 脚本加载顺序（重要！请勿调整） ========== -->

    <!-- 0. 先引入配置文件（放真实密钥） -->
    <script src="config.js"></script>

    <!-- 1. 基础库（同步） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. 核心模块（defer，按依赖顺序排列） -->
    <script defer src="js/utils.js"></script>
    <script defer src="js/toast.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/supabase.js"></script>
    <script defer src="js/permission.js"></script>
    <script defer src="js/audit.js"></script>
    <script defer src="js/order.js"></script>
    <script defer src="js/store.js"></script>
    <script defer src="js/storage.js"></script>
    <script defer src="js/migration.js"></script>

    <!-- 3. 统一缓存模块 -->
    <script defer src="js/cache.js"></script>

    <!-- 4. 页面组件模块 -->
    <script defer src="js/app-dashboard-core.js"></script>
    <script defer src="js/app-dashboard-anomaly.js"></script>
    <script defer src="js/app-dashboard-expenses.js"></script>
    <script defer src="js/app-dashboard-funds.js"></script>
    <script defer src="js/app-dashboard-orders.js"></script>
    <script defer src="js/app-dashboard-print.js"></script>
    <script defer src="js/app-dashboard-users.js"></script>
    <script defer src="js/app-dashboard-wa.js"></script>
    <script defer src="js/app-customers.js"></script>
    <script defer src="js/app-blacklist.js"></script>
    <script defer src="js/app-payments.js"></script>

    <!-- 5. 状态初始化模块 -->
    <script defer src="js/app-state-init.js"></script>

    <!-- 6. 主入口 -->
    <script defer>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.APP === 'undefined') {
                window.APP = {};
            }
            if (typeof window.APP.init === 'function') {
                window.APP.init();
            } else {
                console.error('[Init] APP.init 未定义，请检查模块加载顺序');
            }
        });
    </script>

    <!-- 7. Service Worker 注册（PWA离线支持） -->
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(function() { console.log('✅ Service Worker 已注册'); })
            .catch(function(err) { console.log('Service Worker 注册失败:', err); });
    }
    </script>

</body>
</html>
