<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#ffffff">
<title>JF! by Gadai - Sistem Manajemen Gadai</title>

<!-- Favicon -->
<link rel="icon" href="icons/favicon-192x192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest?v=1">

<!-- CSS 样式 -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/responsive.css">

<!-- 预加载关键资源 -->
<link rel="preconnect" href="https://hiupsvsbcdsgoyiieqiv.supabase.co">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
</head>
<body>
<div id="app">
    <div class="loading-container">
        <div class="loader"></div>
        <p class="loading-text" id="loadingStatus">Memuat sistem...</p>
    </div>
</div>

<!-- ========== 脚本加载顺序（重要！请勿调整） ========== -->
<!-- 1. 基础库（同步） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. 核心模块（defer，按依赖顺序排列） -->
<script defer src="js/utils.js"></script>           <!-- 工具类，无依赖 -->
<script defer src="js/toast.js"></script>          <!-- Toast 通知，依赖 utils -->
<script defer src="js/auth.js"></script>           <!-- 认证模块，依赖 utils -->
<script defer src="js/supabase.js"></script>       <!-- 数据层，依赖 auth, utils -->
<script defer src="js/permission.js"></script>     <!-- 权限模块，依赖 auth -->
<script defer src="js/audit.js"></script>          <!-- 审计日志，依赖 auth, supabase -->
<script defer src="js/order.js"></script>          <!-- 订单模块，依赖 supabase, utils -->
<script defer src="js/store.js"></script>          <!-- 门店管理，依赖 supabase -->
<script defer src="js/storage.js"></script>        <!-- 备份恢复，依赖 supabase, audit -->
<script defer src="js/migration.js"></script>      <!-- 数据迁移，依赖 supabase -->

<!-- 3. 统一缓存模块（必须在所有使用它的模块之前） -->
<script defer src="js/cache.js"></script>                  <!-- 统一缓存模块 -->

<!-- 4. 页面组件模块（defer，依赖核心模块和缓存模块） -->
<script defer src="js/app-dashboard-core.js"></script>     <!-- 核心仪表盘 -->
<script defer src="js/app-dashboard-anomaly.js"></script>  <!-- 异常检测 -->
<script defer src="js/app-dashboard-expenses.js"></script> <!-- 支出管理 -->
<script defer src="js/app-dashboard-funds.js"></script>    <!-- 资金管理 -->
<script defer src="js/app-dashboard-orders.js"></script>   <!-- 订单管理 -->
<script defer src="js/app-dashboard-print.js"></script>    <!-- 打印功能 -->
<script defer src="js/app-dashboard-users.js"></script>    <!-- 用户管理 -->
<script defer src="js/app-dashboard-wa.js"></script>       <!-- WA提醒 -->
<script defer src="js/app-customers.js"></script>          <!-- 客户管理 -->
<script defer src="js/app-blacklist.js"></script>          <!-- 黑名单管理 -->
<script defer src="js/app-payments.js"></script>           <!-- 支付管理 -->

    <!-- 4. 主入口（defer，在所有模块之后） -->
    <script defer>
        // 页面恢复状态存储（在 APP 加载前设置）
        (function() {
            try {
                var savedPage = sessionStorage.getItem('jf_current_page');
                var savedFilter = sessionStorage.getItem('jf_current_filter') || "all";
                var savedOrderId = sessionStorage.getItem('jf_current_order_id');
                var savedCustomerId = sessionStorage.getItem('jf_current_customer_id');
                
                // 如果 sessionStorage 没有，从 localStorage 恢复
                if (!savedPage) {
                    savedPage = localStorage.getItem('jf_last_page');
                    savedFilter = localStorage.getItem('jf_last_filter') || "all";
                    savedOrderId = localStorage.getItem('jf_last_order_id');
                    savedCustomerId = localStorage.getItem('jf_last_customer_id');
                }
                
                // 验证页面是否有效
                var validPages = ['dashboard', 'orderTable', 'createOrder', 'viewOrder', 'payment', 
                                  'anomaly', 'userManagement', 'storeManagement', 'expenses', 
                                  'customers', 'paymentHistory', 'backupRestore', 'customerOrders', 
                                  'customerPaymentHistory', 'blacklist'];
                
                if (savedPage && validPages.includes(savedPage) && savedPage !== 'login') {
                    window._RESTORED_STATE = {
                        page: savedPage,
                        filter: savedFilter,
                        orderId: savedOrderId,
                        customerId: savedCustomerId
                    };
                    console.log('[Init] 页面恢复状态已设置:', savedPage);
                }
            } catch(e) {
                console.warn('[Init] 读取恢复状态失败:', e);
            }
        })();
        
        // 启动应用（等待所有模块加载完成后）
        document.addEventListener('DOMContentLoaded', function() {
            // 确保 APP 对象存在
            if (typeof window.APP === 'undefined') {
                window.APP = {};
            }
            // 启动应用
            if (typeof window.APP.init === 'function') {
                window.APP.init();
            } else {
                console.error('[Init] APP.init 未定义，请检查模块加载顺序');
            }
        });
    </script>
</body>
</html>
