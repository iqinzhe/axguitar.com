<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#ffffff">
<title>JF! - Sistem Manajemen Gadai</title>

<!-- Favicon（唯一入口） -->
<link rel="icon" href="icons/favicon-192x192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest?v=1">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/tables.css">
</head>
<body>
<div id="app">
    <div class="loading-container">
        <div class="loader"></div>
        <p class="loading-text">Memuat sistem...</p>
    </div>
</div>

<!-- 1. 第三方库 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ==================== 基础模块（必须先加载） ==================== -->
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/permission.js"></script>
<script src="js/order.js"></script>
<script src="js/store.js"></script>
<script src="js/storage.js"></script>
<script src="js/audit.js"></script>
<script src="js/migration.js"></script>

<!-- ==================== 功能模块 ==================== -->
<script src="js/app-blacklist.js"></script>
<script src="js/app-customers.js"></script>
<script src="js/app-payments.js"></script>

<!-- ==================== 仪表盘拆分模块（按顺序加载） ==================== -->
<script src="js/app-dashboard-core.js"></script>
<script src="js/app-dashboard-funds.js"></script>
<script src="js/app-dashboard-users.js"></script>
<script src="js/app-dashboard-wa.js"></script>
<script src="js/app-dashboard-print.js"></script>
<script src="js/app-dashboard-orders.js"></script>
<script src="js/app-dashboard-expenses.js"></script>
<script src="js/app-dashboard-report.js"></script>

<!-- ==================== 初始化脚本 ==================== -->
<script>
// ==================== 全局错误捕获 ====================
window.addEventListener('error', function(e) {
    console.error('Global error:', e.error);
});

// ==================== Loading 超时机制 ====================
var initTimeout = setTimeout(function() {
    showError('加载超时，请刷新页面重试');
}, 10000);

// ==================== 页面初始化 ====================
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        clearTimeout(initTimeout);
        try {
            if (!window.APP) {
                throw new Error('APP module not loaded');
            }
            if (typeof window.APP.init !== 'function') {
                throw new Error('APP.init is not a function');
            }
            console.log('🚀 JF! by Gadai - 初始化中...');
            window.APP.init();
        } catch (err) {
            console.error('Init error:', err);
            showError('Gagal memuat aplikasi: ' + err.message);
        }
    }, 100);
});

// ==================== 错误显示函数 ====================
function showError(message) {
    const app = document.getElementById('app');
    if (app) {
        app.innerHTML = `
            <div class="error-container">
                <div class="error-card">
                    <div class="error-icon">⚠️</div>
                    <h3 class="error-title">Error Sistem</h3>
                    <p class="error-message">${escapeHtml(message)}</p>
                    <button onclick="location.reload()" class="error-btn">Muat Ulang</button>
                </div>
            </div>
        `;
    }
}

// ==================== HTML 转义函数 ====================
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ==================== 调试信息（可选，开发完成后可删除） ====================
console.log('📋 模块加载顺序检查:');
console.log('  - supabase.js: ' + (typeof SUPABASE !== 'undefined' ? '✅' : '❌'));
console.log('  - utils.js: ' + (typeof Utils !== 'undefined' ? '✅' : '❌'));
console.log('  - auth.js: ' + (typeof AUTH !== 'undefined' ? '✅' : '❌'));
console.log('  - permission.js: ' + (typeof PERMISSION !== 'undefined' ? '✅' : '❌'));
console.log('  - order.js: ' + (typeof Order !== 'undefined' ? '✅' : '❌'));
console.log('  - store.js: ' + (typeof StoreManager !== 'undefined' ? '✅' : '❌'));
console.log('  - storage.js: ' + (typeof Storage !== 'undefined' ? '✅' : '❌'));
console.log('  - audit.js: ' + (typeof Audit !== 'undefined' ? '✅' : '❌'));
console.log('  - migration.js: ' + (typeof Migration !== 'undefined' ? '✅' : '❌'));
console.log('  - APP 对象: ' + (typeof window.APP !== 'undefined' ? '✅' : '❌'));
</script>
</body>
</html>
