@layer base {

    transition: opacity 0.4s ease;
  }

  /* ── 品牌区（置顶，垂直居中布局） ── */
  .loading-brand {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;

    display: flex; align-items: center; justify-content: center;
  }
  .loading-brand-logo {
    height: 56px; width: auto;
    border-radius: 12px;
  }

    margin: 0;
  }
  .loading-brand-tagline {

    letter-spacing: 0.3px;

  /* ── 阶段指示点（5个圆点，对应5个加载阶段） ── */
  .loading-steps {
    display: flex; gap: 7px; align-items: center;
  }
  .loading-step {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(14, 116, 144, 0.18);
    transition: background 0.35s ease, transform 0.35s ease;
  }
  .loading-step.done {
    background: #0e7490;
  }
  .loading-step.active {
    background: #06b6d4;
    animation: loStepPulse 1s ease-in-out infinite;
  }

  /* ── 动态文字区（主文案 + 副文案） ── */
  .loading-text {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    /* 固定高度：防止不同文案长度引起容器高度抖动 */
    height: 38px;
    justify-content: center;
  }

    font-size: 0.875rem; font-weight: 500;
    color: #3d5068; letter-spacing: 0.3px;
    /* 固定行高，防止字体渲染差异导致跳动 */
    line-height: 1.4;
    white-space: nowrap;

    transition: opacity 0.2s ease;

<!--
  ==================== 脚本加载策略 ====================

  第 0 层：立即执行（内联同步脚本）
    - Token 状态检查 + 进度控制初始化（含伪进度平滑 + 动态文案 + 阶段点同步）

  第 1 层：CDN + 核心基础（defer，按序执行）
    - config.js → supabase-js（锁定版本 2.105.4）
    - js/utils.js → fee-config.js
    - toast.js → cache.js → supabase.js → auth.js → permission.js → audit.js
    - order.js → store.js → storage.js → migration.js

  第 2 层：核心应用（defer）
    - app-dashboard-core.js（首屏仪表盘）

  第 3 层：非核心页面模块（defer，不阻塞首屏）

  第 4 层：启动逻辑（type="module"）
    - module 脚本天然在所有 defer 脚本执行完毕后运行

  📊 加载进度分布（优化版）：
    0%  ── 页面开始加载（伪进度爬行启动：0→45%）
    50% ── 基础模块全部就绪（migration.js onload）
    90% ── app-dashboard-core.js 就绪（onload）
    93% ── DashboardCore.init() 开始执行
    96% ── KPI 数据查询完成
    100% ─ DOM 渲染完成，加载层淡出

  📝 动态文案阶段：
    0-15%   ── Memulai sistem...     / Memeriksa sesi login
    16-49%  ── Memuat modul dasar... / utils · toast · cache · supabase
    50-89%  ── Memuat modul inti...  / Menghubungkan ke server
    90-95%  ── Menyiapkan dasbor...  / app-dashboard-core siap
    96-99%  ── Memuat data KPI...    / Mengambil data terkini
    100%    ── Siap!                 / Membuka sistem...
-->

<!-- ========== 第 0 层：Token 状态初始化 + 进度控制（优化版） ========== -->
<script>
(function () {
    'use strict';

    // ================================================================
    // 进度阶段配置（百分比阈值 → 文案 + 阶段点）
    // ================================================================
    var STAGES = [
        { from:  0, to: 15, main: 'Memulai sistem...',      sub: 'Memeriksa sesi login',              step: 0 },
        { from: 16, to: 49, main: 'Memuat modul dasar...',  sub: 'utils \u00b7 toast \u00b7 cache \u00b7 supabase', step: 1 },
        { from: 50, to: 89, main: 'Memuat modul inti...',   sub: 'Menghubungkan ke server',            step: 2 },
        { from: 90, to: 95, main: 'Menyiapkan dasbor...',   sub: 'app-dashboard-core siap',            step: 3 },
        { from: 96, to: 99, main: 'Memuat data KPI...',     sub: 'Mengambil data terkini',             step: 3 },
        { from:100, to:100, main: 'Siap!',                  sub: 'Membuka sistem...',                  step: 4 }
    ];

    // ================================================================
    // 内部状态
    // ================================================================
    var currentProgress = 0;
    var fakeTimer       = null;

    // ================================================================
    // 工具：根据进度值找到对应阶段
    // ================================================================
    function getStage(pct) {
        for (var i = STAGES.length - 1; i >= 0; i--) {
            if (pct >= STAGES[i].from) return STAGES[i];
        }
        return STAGES[0];
    }

    // ================================================================
    // 工具：更新 5 个阶段点（done / active / 未激活）
    // ================================================================
    function updateSteps(activeIndex) {
        for (var i = 1; i <= 5; i++) {
            var el = document.getElementById('lstep' + i);
            if (!el) continue;
            var idx = i - 1; // 0-based
            if (idx < activeIndex) {
                el.className = 'loading-step done';
            } else if (idx === activeIndex) {
                el.className = 'loading-step active';
            } else {
                el.className = 'loading-step';
            }
        }
    }

    // ================================================================
    // 工具：文案淡出 → 换字 → 淡入（消除闪动）
    // ================================================================
    var lastStageIndex = -1;
    var textSwitching  = false;

    function switchText(newMain, newSub) {
        var mainEl = document.getElementById('loadingTextMain');
        var subEl  = document.getElementById('loadingTextSub');
        if (!mainEl || !subEl) return;

        // 如果文案没有变化，跳过切换
        if (mainEl.textContent === newMain && subEl.textContent === newSub) return;

        // 防止重入：若上一次切换还未完成，直接跳到目标
        if (textSwitching) {
            mainEl.classList.remove('fading');
            subEl.classList.remove('fading');
            mainEl.textContent = newMain;
            subEl.textContent  = newSub;
            return;
        }

        textSwitching = true;

        // 第一步：淡出（opacity → 0）
        mainEl.classList.add('fading');
        subEl.classList.add('fading');

        // 第二步：200ms 后换字（对应 transition: opacity 0.2s）
        setTimeout(function () {
            mainEl.textContent = newMain;
            subEl.textContent  = newSub;

            // 第三步：强制重排后淡入（opacity → 1）
            void mainEl.offsetWidth;
            mainEl.classList.remove('fading');
            subEl.classList.remove('fading');
            textSwitching = false;
        }, 210);
    }

    // ================================================================
    // 核心：更新进度条 + 百分比 + 文案 + 阶段点
    // ================================================================
    window.__updateLoadingProgress = function (targetPercent) {
        if (targetPercent <= currentProgress) return;
        currentProgress = targetPercent;

        // — 进度条宽度 —
        var bar = document.getElementById('loadingProgressBar');
        if (bar) bar.style.width = currentProgress + '%';

        // — 百分比数字 —
        var pctEl = document.getElementById('loadingProgressPct');
        if (pctEl) pctEl.textContent = currentProgress + '%';

        // — 动态文案（只在阶段切换时才执行淡入淡出，避免频繁闪烁）—
        var stage      = getStage(currentProgress);
        var stageIndex = STAGES.indexOf(stage);
        if (stageIndex !== lastStageIndex) {
            lastStageIndex = stageIndex;
            switchText(stage.main, stage.sub);
        }

        // — 阶段指示点 —
        updateSteps(stage.step);

        // — 到达真实节点后停止伪进度爬行 —
        if (currentProgress >= 50 && fakeTimer) {
            clearInterval(fakeTimer);
            fakeTimer = null;
        }
    };

    // ================================================================
    // 伪进度爬行：解决 0→50% 等待段用户感知空白
    // 每 900ms 推进 3%，上限 45%（真实节点 50% 到达时自动停止）
    // ================================================================
    fakeTimer = setInterval(function () {
        if (currentProgress < 45) {
            window.__updateLoadingProgress(currentProgress + 3);
        } else {
            clearInterval(fakeTimer);
            fakeTimer = null;
        }
    }, 900);

    // ================================================================
    // Token 状态检查（原有逻辑保持不变）
    // ================================================================
    try {
        var hasValidToken = false;
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.startsWith('sb-') && key.endsWith('-auth-token')) {
                try {
                    var tokenData = JSON.parse(localStorage.getItem(key));
                    if (tokenData && tokenData.expires_at) {
                        if (new Date(tokenData.expires_at * 1000) > new Date()) {
                            hasValidToken = true;
                        }
                    }
                } catch (e) { /* 数据损坏，忽略 */ }
                break;
            }
        }
        if (!hasValidToken) {
            try {
                var clearKeys = [
                    'jf_current_state', 'jf_last_state', 'jf_current_page',
                    'jf_current_filter', 'jf_current_order_id', 'jf_current_customer_id',
                    'jf_last_page', 'jf_last_filter', 'jf_last_order_id', 'jf_last_customer_id'
                ];
                clearKeys.forEach(function (k) {
                    sessionStorage.removeItem(k);
                    localStorage.removeItem(k);
                });
            } catch (e) { /* ignore */ }
        }
    } catch (e) { /* 静默处理 */ }
})();
</script>

<!-- ========== 第 4 层：启动逻辑（type="module"） ========== -->
<script type="module">
(function () {
    'use strict';

    var JF = window.JF || {};
    window.JF = JF;

    // ==================== APP 门面层 ====================
    var APP = {
        forceClearAndReload: function () {
            try {
                var keysToRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && (
                        key.indexOf('supabase.') === 0 ||
                        key.indexOf('sb-') === 0 ||
                        key.indexOf('jf_') === 0
                    )) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(function (k) { localStorage.removeItem(k); });
                sessionStorage.clear();
                document.cookie.split(';').forEach(function (c) {
                    document.cookie = c.replace(/^ +/, '')
                        .replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/');
                });
            } catch (e) { /* ignore */ }
            setTimeout(function () { location.reload(); }, 500);
        },

        exportData: function () {
            if (typeof BackupStorage !== 'undefined' && BackupStorage.backup) {
                BackupStorage.backup();
            } else {
                Utils.toast.error(Utils.t('backup_restore') + ' ' +
                    (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
            }
        },

        importData: function () {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                if (e.target.files && e.target.files[0]) {
                    if (typeof BackupStorage !== 'undefined' && BackupStorage.restore) {
                        BackupStorage.restore(e.target.files[0]);
                    } else {
                        Utils.toast.error(Utils.t('backup_restore') + ' ' +
                            (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
                    }
                }
            };
            input.click();
        },

        sendWAReminder: async function (orderId) {
            try {
                var result = await SUPABASE.getPaymentHistory(orderId);
                var order = result.order;
                if (!order) {
                    Utils.toast.error(Utils.t('order_not_found'));
                    return;
                }
                var storeWA = await SUPABASE.getStoreWANumber(order.store_id);
                if (!storeWA) {
                    Utils.toast.warning(Utils.lang === 'id'
                        ? 'Nomor WhatsApp toko belum diatur' : '门店 WhatsApp 号码未设置');
                    return;
                }
                var customerPhone = order.customer_phone;
                if (!customerPhone) {
                    Utils.toast.warning(Utils.lang === 'id'
                        ? 'Nomor telepon nasabah tidak tersedia' : '客户电话不存在');
                    return;
                }
                var cleanPhone = customerPhone.replace(/[^0-9]/g, '');
                if (cleanPhone.indexOf('0') === 0) {
                    cleanPhone = '62' + cleanPhone.substring(1);
                } else if (cleanPhone.indexOf('62') !== 0) {
                    cleanPhone = '62' + cleanPhone;
                }
                var waMessage = JF.WAPage ? JF.WAPage.generateWAText(order, storeWA) : '';
                window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(waMessage), '_blank');
                await SUPABASE.logReminder(order.id);
                Utils.toast.success(Utils.lang === 'id' ? 'Membuka WhatsApp...' : '正在打开 WhatsApp...');
            } catch (error) {
                Utils.toast.error(Utils.lang === 'id' ? 'Gagal mengirim pengingat' : '发送提醒失败');
            }
        },

        printCurrentPage: function () {
            if (JF.PrintPage && typeof JF.PrintPage.printCurrentPage === 'function') {
                JF.PrintPage.printCurrentPage();
            } else {
                window.print();
            }
        }
    };

    window.APP = Object.assign(window.APP || {}, APP);
    JF.APP = window.APP;

    // ==================== 全局快捷键 ====================
    document.addEventListener('keydown', function (e) {
        if (e.altKey && !e.shiftKey && e.key === 'r') {
            e.preventDefault();
            if (JF.DashboardCore && typeof JF.DashboardCore.forceRecovery === 'function') {
                JF.DashboardCore.forceRecovery();
            } else if (window.APP && typeof window.APP.forceRecovery === 'function') {
                window.APP.forceRecovery();
            } else {
                location.reload();
            }
        }
        if (e.altKey && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            APP.forceClearAndReload();
        }
    });

    // ==================== 应用启动 ====================
    var loadingOverlay   = document.getElementById('loadingOverlay');
    var dashboardContent = document.getElementById('dashboardContent');

    function hideLoading() {
        if (window.__updateLoadingProgress) window.__updateLoadingProgress(100);

        setTimeout(function () {
            if (loadingOverlay) {
                loadingOverlay.style.transition = 'opacity 0.5s ease';
                loadingOverlay.style.opacity = '0';
                setTimeout(function () { loadingOverlay.style.display = 'none'; }, 500);
            }
            if (dashboardContent) dashboardContent.classList.add('loaded');
        }, 300);
    }

    window.__hideLoadingOverlay = hideLoading;

    var fallbackObserver = new MutationObserver(function () {
        var appEl = document.getElementById('app');
        if (appEl && appEl.querySelector('.dashboard-v2')) {
            hideLoading();
            fallbackObserver.disconnect();
        }
    });

    function startApp() {
        if (typeof JF !== 'undefined' && JF.DashboardCore && JF.DashboardCore.init) {
            // 核心模块就绪，开始初始化
            if (window.__updateLoadingProgress) window.__updateLoadingProgress(93);

            // 注入 KPI 完成回调
            var originalRender = JF.DashboardCore.originalRenderDashboard;
            if (originalRender) {
                JF.DashboardCore.originalRenderDashboard = async function () {
                    var result = await originalRender.apply(this, arguments);
                    if (window.__updateLoadingProgress) window.__updateLoadingProgress(96);
                    return result;
                };
            }

            JF.DashboardCore.init();

            var appEl = document.getElementById('app');
            if (appEl) {
                fallbackObserver.observe(appEl, { childList: true, subtree: true });
                setTimeout(function () {
                    if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                        hideLoading();
                        fallbackObserver.disconnect();
                    }
                }, 15000);
            }
        } else {
            setTimeout(startApp, 100);
        }
    }

    startApp();
})();
</script>

</body>
</html>
