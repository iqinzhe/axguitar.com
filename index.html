<!-- 初始化脚本 -->
<script>
window.addEventListener('error', function(e) {
    console.error('Global error:', e.error);
});

var initTimeout = setTimeout(function() {
    showError('加载超时，请刷新页面重试');
}, 10000);

document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        clearTimeout(initTimeout);
        try {
            if (!window.APP) throw new Error('APP module not loaded');
            if (typeof window.APP.init !== 'function') throw new Error('APP.init is not a function');
            window.APP.init();
        } catch (err) {
            console.error('Init error:', err);
            showError('Gagal memuat aplikasi: ' + err.message);
        }
    }, 100);
});

function showError(message) {
    var app = document.getElementById('app');
    if (app) {
        app.innerHTML = '' +
            '<div class="error-container">' +
                '<div class="error-card">' +
                    '<div class="error-icon">⚠️</div>' +
                    '<h3 class="error-title">Error Sistem</h3>' +
                    '<p class="error-message">' + escapeHtml(message) + '</p>' +
                    '<button onclick="location.reload()" class="error-btn">Muat Ulang</button>' +
                '</div>' +
            '</div>';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
</script>
