<!--
  ==================== 脚本加载策略 ====================
  
  第 0 层：立即执行
    - token 状态检查内联代码
  
  第 1 层：CDN + 核心基础（defer，按序执行）
    - config.js → supabase-js → utils.js → toast.js → cache.js
    - supabase.js → auth.js → permission.js → audit.js
    - order.js → store.js → storage.js → migration.js
  
  第 2 层：核心应用（defer）
    - app-dashboard-core.js（首屏仪表盘）
  
  第 3 层：非核心模块（defer，浏览器自动按序加载，不阻塞首屏）
    - 所有 app-*.js 页面模块
  
  第 4 层：内联启动逻辑（defer）
    - 应用启动控制
-->

<!-- ========== 第 0 层：Token 状态初始化（立即执行，不依赖 DOM） ========== -->
<script>
// app-state-init.js - v2.3 内联版
// 在页面加载时检查 token 有效性，无有效 token 则清除所有页面恢复状态
(function () {
    'use strict';
    try {
        var hasValidToken = false;
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.startsWith('sb-') && key.indexOf('-auth-token') !== -1) {
                try {
                    var tokenData = JSON.parse(localStorage.getItem(key));
                    if (tokenData && tokenData.expires_at) {
                        var expiresAt = new Date(tokenData.expires_at * 1000);
                        if (expiresAt > new Date()) {
                            hasValidToken = true;
                        }
                    }
                } catch (e) { /* 数据损坏，忽略 */ }
                break;
            }
        }
        if (!hasValidToken) {
            try {
                sessionStorage.removeItem('jf_current_state');
                localStorage.removeItem('jf_last_state');
                sessionStorage.removeItem('jf_current_page');
                sessionStorage.removeItem('jf_current_filter');
                sessionStorage.removeItem('jf_current_order_id');
                sessionStorage.removeItem('jf_current_customer_id');
                localStorage.removeItem('jf_last_page');
                localStorage.removeItem('jf_last_filter');
                localStorage.removeItem('jf_last_order_id');
                localStorage.removeItem('jf_last_customer_id');
                console.log('[StateInit] 无有效 token，已清除所有页面恢复状态');
            } catch (e) { /* ignore */ }
        } else {
            console.log('[StateInit] 检测到有效 token，保留页面恢复状态');
        }
    } catch (e) { /* 静默处理 */ }
})();
</script>

<!-- ========== 第 1 层：核心基础脚本（defer，按序执行） ========== -->

<!-- ========== 第 4 层：内联启动逻辑（合并原 app.js + 启动控制） ========== -->
<script>
// 合并了原 app.js 和 index.html 中的启动逻辑
(function () {
    'use strict';

    // ==================== app.js 逻辑（门面层） ====================
    var JF = window.JF || {};
    window.JF = JF;

    var APP = {
        forceClearAndReload: function () {
            console.log('[APP] 强制清除所有存储并重新加载');
            try {
                var keysToRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && (
                        key.indexOf('supabase.') === 0 ||
                        key.indexOf('sb-') === 0 ||
                        key.indexOf('jf_') === 0
                    )) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(function (k) { localStorage.removeItem(k); });
                sessionStorage.clear();
                document.cookie.split(";").forEach(function (c) {
                    document.cookie = c.replace(/^ +/, "")
                        .replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                });
                console.log('[APP] 已清除 ' + keysToRemove.length + ' 个存储项');
            } catch (e) {
                console.warn('[APP] 清除存储失败:', e.message);
            }
            setTimeout(function () { location.reload(); }, 500);
        },

        exportData: function () {
            if (typeof BackupStorage !== 'undefined' && BackupStorage.backup) {
                BackupStorage.backup();
            } else {
                Utils.toast.error(Utils.t('backup_restore') + ' ' + (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
            }
        },

        importData: function () {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                if (e.target.files && e.target.files[0]) {
                    if (typeof BackupStorage !== 'undefined' && BackupStorage.restore) {
                        BackupStorage.restore(e.target.files[0]);
                    } else {
                        Utils.toast.error(Utils.t('backup_restore') + ' ' + (Utils.lang === 'id' ? 'tidak tersedia' : '不可用'));
                    }
                }
            };
            input.click();
        },

        sendWAReminder: async function (orderId) {
            try {
                var result = await SUPABASE.getPaymentHistory(orderId);
                var order = result.order;
                if (!order) {
                    Utils.toast.error(Utils.t('order_not_found'));
                    return;
                }
                var storeWA = await SUPABASE.getStoreWANumber(order.store_id);
                if (!storeWA) {
                    Utils.toast.warning(Utils.lang === 'id' ? 'Nomor WhatsApp toko belum diatur' : '门店 WhatsApp 号码未设置');
                    return;
                }
                var customerPhone = order.customer_phone;
                if (!customerPhone) {
                    Utils.toast.warning(Utils.lang === 'id' ? 'Nomor telepon nasabah tidak tersedia' : '客户电话不存在');
                    return;
                }
                var cleanPhone = customerPhone.replace(/[^0-9]/g, '');
                if (cleanPhone.indexOf('62') !== 0 && cleanPhone.indexOf('0') !== 0) {
                    cleanPhone = '62' + cleanPhone;
                }
                if (cleanPhone.indexOf('0') === 0) {
                    cleanPhone = '62' + cleanPhone.substring(1);
                }
                var waMessage = JF.WAPage ? JF.WAPage.generateWAText(order, storeWA) : '';
                var encodedMessage = encodeURIComponent(waMessage);
                window.open('https://wa.me/' + cleanPhone + '?text=' + encodedMessage, '_blank');
                await SUPABASE.logReminder(order.id);
                Utils.toast.success(Utils.lang === 'id' ? 'Membuka WhatsApp...' : '正在打开 WhatsApp...');
            } catch (error) {
                console.error("sendWAReminder error:", error);
                Utils.toast.error(Utils.lang === 'id' ? 'Gagal mengirim pengingat' : '发送提醒失败');
            }
        },

        printCurrentPage: function () {
            if (JF.PrintPage && typeof JF.PrintPage.printCurrentPage === 'function') {
                JF.PrintPage.printCurrentPage();
            } else {
                window.print();
            }
        }
    };

    window.APP = Object.assign(window.APP || {}, APP);
    JF.APP = window.APP;

    // ==================== 全局快捷键 ====================
    document.addEventListener('keydown', function (e) {
        if (e.altKey && e.key === 'r') {
            e.preventDefault();
            if (JF.DashboardCore && typeof JF.DashboardCore.forceRecovery === 'function') {
                JF.DashboardCore.forceRecovery();
            } else if (window.APP && typeof window.APP.forceRecovery === 'function') {
                window.APP.forceRecovery();
            } else {
                location.reload();
            }
        }
    });

    document.addEventListener('keydown', function (e) {
        if (e.altKey && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            APP.forceClearAndReload();
        }
    });

    console.log('[Boot] 核心模块 + 门面层已就绪');

    // ==================== 应用启动 ====================
    var loadingOverlay = document.getElementById('loadingOverlay');
    var dashboardContent = document.getElementById('dashboardContent');

    function hideLoadingAndShowContent() {
        if (loadingOverlay) {
            loadingOverlay.style.transition = 'opacity 0.3s ease';
            loadingOverlay.style.opacity = '0';
            setTimeout(function () {
                loadingOverlay.style.display = 'none';
            }, 300);
        }
        if (dashboardContent) {
            dashboardContent.classList.add('loaded');
        }
    }

    function startApp() {
        if (typeof JF !== 'undefined' && JF.DashboardCore && JF.DashboardCore.init) {
            console.log('[Boot] 启动应用');
            JF.DashboardCore.init();
            setTimeout(hideLoadingAndShowContent, 100);
        } else {
            console.warn('[Boot] DashboardCore 未就绪，等待中...');
            setTimeout(startApp, 200);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(startApp, 100);
        });
    } else {
        setTimeout(startApp, 100);
    }
})();
</script>
