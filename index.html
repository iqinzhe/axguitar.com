<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#ffffff">
<title>JF! by Gadai - Sistem Manajemen Gadai</title>

<!-- Favicon -->
<link rel="icon" href="icons/favicon-192x192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest?v=1">

<!-- CSS 样式（v2.0 统一版本） -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/responsive.css">

<!-- 预加载关键资源 -->
<link rel="preconnect" href="https://hiupsvsbcdsgoyiieqiv.supabase.co">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
</head>
<body>
<div id="app">
    <div class="loading-container">
        <div class="loader"></div>
        <p class="loading-text" id="loadingStatus">Memuat sistem...</p>
    </div>
</div>

<!-- ========== 脚本加载顺序（v2.0 JF 命名空间，请勿调整） ========== -->

    <!-- 0. 配置文件（Supabase 密钥等） -->
    <script src="config.js"></script>

    <!-- 1. 基础库（同步加载） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. 核心模块（defer，严格按依赖顺序） -->
    <script defer src="js/utils.js"></script>           <!-- 工具类 + 语言 + 翻译字典，无依赖 -->
    <script defer src="js/toast.js"></script>          <!-- Toast 通知系统，依赖 utils -->
    <script defer src="js/cache.js"></script>          <!-- 统一缓存模块，无依赖 -->
    <script defer src="js/supabase.js"></script>       <!-- 数据层，依赖 utils, auth -->
    <script defer src="js/auth.js"></script>           <!-- 认证模块，依赖 utils, toast -->
    <script defer src="js/permission.js"></script>     <!-- 权限模块，依赖 auth, supabase -->
    <script defer src="js/audit.js"></script>          <!-- 审计日志，依赖 auth, supabase -->
    <script defer src="js/order.js"></script>          <!-- 订单业务模块，依赖 supabase, utils -->
    <script defer src="js/store.js"></script>          <!-- 门店管理，依赖 supabase -->
    <script defer src="js/storage.js"></script>        <!-- 备份恢复，依赖 supabase, audit -->
    <script defer src="js/migration.js"></script>      <!-- 数据迁移，依赖 supabase -->

    <!-- 3. 页面组件模块（defer，依赖核心模块和缓存） -->
    <script defer src="js/app-dashboard-core.js"></script>     <!-- 核心仪表盘 + 路由 -->
    <script defer src="js/app-dashboard-anomaly.js"></script>  <!-- 异常检测 -->
    <script defer src="js/app-dashboard-expenses.js"></script> <!-- 支出管理 -->
    <script defer src="js/app-dashboard-funds.js"></script>    <!-- 资金管理 -->
    <script defer src="js/app-dashboard-orders.js"></script>   <!-- 订单管理 -->
    <script defer src="js/app-dashboard-print.js"></script>    <!-- 打印功能 -->
    <script defer src="js/app-dashboard-users.js"></script>    <!-- 用户管理 -->
    <script defer src="js/app-dashboard-wa.js"></script>       <!-- WA 提醒 -->
    <script defer src="js/app-customers.js"></script>          <!-- 客户管理 -->
    <script defer src="js/app-blacklist.js"></script>          <!-- 黑名单管理 -->
    <script defer src="js/app-payments.js"></script>           <!-- 支付管理 -->

    <!-- 4. 状态初始化（预加载恢复状态） -->
    <script defer src="js/app-state-init.js"></script>

    <!-- 5. 主入口（依赖所有模块） -->
    <script defer src="js/app.js"></script>

    <!-- 6. 启动应用 -->
<script defer>
    (async function boot() {
        for (let i = 0; i < 30; i++) {
            if (typeof JF !== 'undefined' && 
                typeof JF.DashboardCore !== 'undefined' && 
                typeof JF.DashboardCore.init === 'function') {
                console.log('[Boot] DashboardCore 已就绪，启动应用');
                await JF.DashboardCore.init();
                return;
            }
            await new Promise(r => setTimeout(r, 100));
        }
        console.error('[Boot] DashboardCore.init 未在 3 秒内出现');
        if (typeof APP !== 'undefined' && typeof APP.init === 'function') {
            APP.init();
        } else {
            document.getElementById('app').innerHTML = 
                '<div class="card" style="text-align:center;padding:40px;">' +
                '<p>⚠️ Sistem gagal dimuat. Silakan muat ulang halaman.</p>' +
                '<button onclick="location.reload()" style="margin-top:12px;">🔄 Muat Ulang</button>' +
                '</div>';
        }
    })();
</script>

</body>
</html>
